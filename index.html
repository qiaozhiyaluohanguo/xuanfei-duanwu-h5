<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>接住宣肺端午安康</title>
  <link rel="preload" href="./assets/duanwu-premium-bg.webp" as="image">
  <link rel="preload" href="./assets/gansu-yaotou-logo.png" as="image">
  <link rel="preload" href="./assets/xuanfei-poster.webp" as="image">
  <link rel="preload" href="./assets/xuanfei-product-cutout.png" as="image">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" id="stage" aria-label="接住宣肺端午安康互动页面">
    <section class="screen start-screen is-active" id="startScreen">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="brand-logo-card">
        <img src="./assets/gansu-yaotou-logo.png" alt="甘肃药业投资集团有限公司" width="526" height="112">
      </div>
      <div class="brand-row">
        <span class="seal">端午互动</span>
        <span class="line"></span>
        <span>产品宣传 · 企业形象 · 节日祝福</span>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">宣肺止嗽合剂</p>
        <h1>接住药投端午福包</h1>
        <p class="subtitle">点亮红包，解锁企业名片、产品名片和端午祝福。</p>
      </div>
      <div class="start-reward-card">
        <div>
          <span>收集 3 个</span>
          <strong>认识甘肃药投</strong>
        </div>
        <div>
          <span>收集 6 个</span>
          <strong>解锁宣肺产品</strong>
        </div>
        <div>
          <span>收集 9 个</span>
          <strong>生成祝福卡</strong>
        </div>
      </div>
      <div class="product-altar">
        <img class="deco deco-zongzi" src="./assets/zongzi.svg" alt="">
        <img class="deco deco-mugwort" src="./assets/mugwort.svg" alt="">
        <img class="deco deco-sachet" src="./assets/sachet.svg" alt="">
        <div class="poster-frame">
          <img src="./assets/xuanfei-poster.webp" alt="宣肺止嗽合剂端午宣传海报" width="720" height="792">
        </div>
        <div class="bottle-card">
          <img src="./assets/xuanfei-product-cutout.png" alt="宣肺止嗽合剂产品图" width="765" height="535">
        </div>
      </div>
      <button class="primary-action" id="startBtn" type="button">
        <span>开始接福包</span>
        <small>点红包 · 解锁企业宣传卡</small>
      </button>
      <div class="gesture-hint">
        <span class="tap-ring"></span>
        <span>站在屏幕前，点中掉落红包</span>
      </div>
    </section>

    <section class="screen game-screen" id="gameScreen">
      <div class="game-logo">
        <img src="./assets/gansu-yaotou-logo.png" alt="甘肃药业投资集团有限公司">
      </div>
      <div class="topbar">
        <div>
          <span class="metric-label">红包</span>
          <strong><span id="packetText">0</span>个</strong>
        </div>
        <div>
          <span class="metric-label">剩余</span>
          <strong><span id="timeText">45</span>s</strong>
        </div>
      </div>
      <div class="game-title">
        <p>触摸收集红包</p>
        <h2>解锁药投端午礼</h2>
      </div>
      <div class="playfield" id="playfield" aria-live="polite"></div>
      <div class="unlock-card" id="unlockCard">
        <span id="unlockKicker">企业名片</span>
        <strong id="unlockTitle">甘肃药投</strong>
        <p id="unlockText">核心产品：宣肺止嗽合剂、元胡止痛滴丸。</p>
      </div>
      <div class="collection-panel">
        <div class="collection-copy">
          <span>当前目标</span>
          <strong id="blessingText">收集 3 个红包</strong>
        </div>
        <div class="milestone-track" id="dots" aria-hidden="true">
          <i data-label="3"></i><i data-label="6"></i><i data-label="9"></i>
        </div>
      </div>
      <div class="tip-card" id="tipCard">
        <span id="tipKind">祝福签</span>
        <p id="tipText">端午佩艾，愿你安康顺遂。</p>
      </div>
    </section>

    <section class="screen result-screen" id="resultScreen">
      <div class="result-bg"></div>
      <div class="result-logo">
        <img src="./assets/gansu-yaotou-logo.png" alt="甘肃药业投资集团有限公司">
      </div>
      <p class="eyebrow">端午企业宣传互动</p>
      <h2>药投端午福包已解锁</h2>
      <div class="result-card">
        <img src="./assets/xuanfei-product-cutout.png" alt="宣肺止嗽合剂产品宣传图" width="765" height="535" loading="lazy">
        <div class="result-score">
          <span>本次收集红包</span>
          <strong><span id="finalScore">0</span>个</strong>
        </div>
        <p id="resultCopy">愿清风入怀，粽香常在，工作顺遂，身体安康。</p>
      </div>
      <div class="result-actions">
        <button class="primary-action compact" id="againBtn" type="button">再接一次祝福</button>
        <button class="ghost-action" id="idleBtn" type="button">回到展示页</button>
      </div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
